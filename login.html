<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - EA-Factory</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=Noto+Serif+Thai:wght@400;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

  <link rel="stylesheet" href="../css/login.css" />
</head>

<body>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/core/supabaseClient.js"></script>

  <header class="pvt-top-header">
    <h1>ระบบบันทึกข้อมูลของเสียจากการผลิต</h1>
    <p>บริษัท พี.วี.ที.แอนด์ ที.พลาส จำกัด</p>
  </header>

  <main class="login-page">

    <section class="guide-card" id="guideCard">
      <button type="button" class="btn-guide-toggle" onclick="toggleGuidePanel()">
        <span class="toggle-icon">ℹ️</span> 
        <span class="toggle-text">ดูวิธีเข้าใช้งาน</span>
      </button>
      
      <h3>วิธีเข้าใช้งาน</h3>
      <div class="mode-box">
        <b>💻 Notebook / PC</b>
        <p>ใช้ Username + Password สำหรับ Admin, บัญชี, หัวหน้า, ผู้บริหาร</p>
      </div>
      <div class="mode-box">
        <b>📱 Tablet / Mobile</b>
        <p>สแกน QR Code ประจำแผนก แล้วเลือกชื่อผู้บันทึก</p>
      </div>
    </section>

    <section class="login-card">
      <form id="loginForm" onsubmit="handlePasswordLogin(event)">
   
        <h2>🔐 เข้าสู่ระบบ</h2>
        <p class="subtitle">สำหรับ Notebook / PC</p>

        <div class="form-group">
          <label for="username">Username</label>
          <input
            id="username"
            class="form-control"
            type="text"
            placeholder="เช่น PVT001"
            autocomplete="username"
            required
          />
        </div>

        <div class="form-group">
          <label for="pvtPassword">Password</label>
          <div class="password-row">
            <input
              id="pvtPassword"
              class="form-control"
              type="password"
              placeholder="กรอกรหัสผ่าน"
              autocomplete="current-password"
              required
            />
            <button type="button" class="btn-eye" onclick="togglePasswordVisibility()">
              👁️
            </button>
          </div>
        </div>

        <label class="remember-row">
          <input type="checkbox" id="rememberMe" />
          จำ Username ไว้ในเครื่องนี้
        </label>

        <button type="submit" class="btn-login">
          เข้าสู่ระบบ
        </button>
      </form>
    </section>

  </main>

  <script src="auth/login.js"></script>
</body>
</html>

<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | EA Factory</title>

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/BG1.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/BG1.png" />
    <link rel="apple-touch-icon" href="/icons/Ea_Factory_512.png" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4caf8a" />

    <!-- CSS -->
    <link rel="stylesheet" href="/css/loadingService.css" />
    <link rel="stylesheet" href="/css/login.css" />
  </head>

  <body>
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/core/supabaseClient.js"></script>
    <script src="/core/activityLogger.js"></script>
    <!-- Splash Screen -->
    <div id="splash-screen">
      <div class="splash-logo">
        <img src="/icons/Ea_Factory_512.png" alt="EA Factory Logo" />
      </div>
      <!-- <div class="splash-title">EA Factory</div> -->
      <div class="splash-sub">ศูนย์รวมข้อมูลและระบบงาน</div>
      <div class="splash-dots"><span></span><span></span><span></span></div>
    </div>

    <!-- Login Overlay -->
    <div id="login-overlay" class="hidden">
      <div class="overlay-box">
        <div class="overlay-ring"></div>
        <h3>กำลังเข้าสู่ระบบ...</h3>
        <p>กรุณารอสักครู่</p>
      </div>
    </div>

    <div class="pvt-top-header">
      <div class="logo">
        <img src="/icons/Ea_Factory_512.png" alt="EA Factory Logo" />
        <div>
          <!-- <h2>EA Factory</h2> -->
          <!-- <p>ศูนย์รวมข้อมูลและระบบงาน</p> -->
        </div>
      </div>

      <h1>ระบบบันทึกข้อมูลของเสียจากการผลิต</h1>
      <p>บริษัท พี.วี.ที.แอนด์ ที.พลาส จำกัด</p>
    </div>
    <!-- Main Login -->
    <main class="login-page">
      <section class="login-card">
        <form id="loginForm" onsubmit="handlePasswordLogin(event)">
          <h2>🔐 เข้าสู่ระบบ</h2>
          <!-- <p class="subtitle">สำหรับ Notebook / PC</p> -->

          <div class="form-group">
            <label for="username">Username</label>
            <input
              id="username"
              class="form-control"
              type="text"
              placeholder="เช่น PVT001"
              autocomplete="username"
              required
            />
          </div>

          <div class="form-group">
            <label for="pvtPassword">Password</label>
            <div class="password-row">
              <input
                id="pvtPassword"
                class="form-control"
                type="password"
                placeholder="กรอกรหัสผ่าน"
                autocomplete="current-password"
                required
              />
              <button
                type="button"
                class="btn-eye"
                onclick="togglePasswordVisibility()"
              >
                <span class="material-symbols-outlined" id="eyeIcon">
                  visibility
                </span>
              </button>
            </div>
          </div>

          <label class="remember-row">
            <input type="checkbox" id="rememberMe" />
            จำ Username ไว้ในเครื่องนี้
          </label>

          <button type="submit" class="btn-login">เข้าสู่ระบบ</button>

          <button type="button" class="btn-scan-qr" onclick="showQrScanner()">
            <span class="material-symbols-outlined"> qr_code_scanner </span>
            สแกน QR Code
          </button>
        </form>
      </section>
      <div id="qrScannerModal" class="qr-modal hidden">
        <div class="qr-modal-box">
          <div class="qr-modal-header">
            <h3>สแกน QR Code</h3>

            <button
              type="button"
              class="qr-close"
              onclick="window.location.href = 'login.html'"
            >
              ✕
            </button>
          </div>

          <div id="qr-reader"></div>

          <p class="qr-hint">นำกล้องไปส่อง QR Code ประจำแผนก</p>
        </div>
      </div>

      <!-- QR Login Box -->
      <section class="qr-login-box hidden" id="qrLoginBox">
        <h2>📱 เข้าระบบผ่าน QR Code</h2>
        <p class="subtitle">แผนก: <strong id="qrDeptName">-</strong></p>

        <div class="form-group">
          <label for="qrStaffSelect">เลือกชื่อผู้บันทึก</label>
          <select id="qrStaffSelect" class="form-control">
            <option value="">-- เลือกผู้บันทึก --</option>
          </select>
        </div>

        <button type="button" class="btn-qr" onclick="handleQrLogin()">
          เข้าสู่หน้าบันทึกข้อมูล
        </button>
      </section>
    </main>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <!-- JS -->

    <script src="/core/roleConfig.js"></script>

    <script src="/auth/login.js"></script>
  </body>
</html>

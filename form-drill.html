<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกข้อมูลการผลิต - แผนกตัดเจาะ</title>
    <link rel="stylesheet" href="main-style.css">
    <script>
        (function() {
            try {
                const user = localStorage.getItem('activeUser');
                const role = localStorage.getItem('activeRole');
                const dept = localStorage.getItem('activeDept');
                if (!user) {
                    alert("🔒 กรุณาเข้าสู่ระบบก่อนใช้งานหน้าฟอร์มบันทึกข้อมูล");
                    window.location.href = 'login.html';
                    return;
                }
                if (role === 'management' || role === 'supervisor') { return; }
                if (dept !== 'drill') { 
                    alert(`🚫 [ปฏิเสธการเข้าถึง] บัญชีของคุณผูกกับแผนก (${dept.toUpperCase()}) ไม่สามารถเข้าใช้งานหน้าฟอร์มแผนกตัดเจาะได้`);
                    window.location.href = `form-${dept}.html`;
                }
            } catch (e) { window.location.href = 'login.html'; }
        })();

        window.onload = function() {
            const user = localStorage.getItem('activeUser') || 'พนักงาน';
            document.getElementById('display-username').innerText = user;
            const role = localStorage.getItem('activeRole');
            if (role === 'management' || role === 'supervisor') {
                document.getElementById('mgr-nav').style.display = 'block';
                document.getElementById('prof-role').innerText = '👑 ผู้เข้าตรวจสอบ';
                document.getElementById('prof-role').style.background = '#2563eb';
            }
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('report-datetime').value = now.toISOString().slice(0, 16);
            const savedTheme = localStorage.getItem('pvtTheme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);
            document.getElementById('themeToggleCheckbox').checked = (savedTheme === 'dark');
            checkOnlineStatus();
        };

        function logout() {
            if(confirm("🚪 คุณต้องการออกจากระบบใช่หรือไม่?")) {
                const rem = localStorage.getItem('rememberedUser');
                localStorage.clear();
                if(rem) localStorage.setItem('rememberedUser', rem);
                window.location.href = 'login.html';
            }
        }

        function toggleTheme() {
            const isDark = document.getElementById('themeToggleCheckbox').checked;
            const theme = isDark ? 'dark' : 'light';
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('pvtTheme', theme);
        }

        function checkOnlineStatus() {
            const bar = document.getElementById('offlineBar');
            if (navigator.onLine) { bar.style.display = 'none'; } else { bar.style.display = 'block'; }
        }

        async function submitForm(event) {
            event.preventDefault();
            const datetime = document.getElementById('report-datetime').value;
            const type = document.getElementById('problem-title').value;
            const note = document.getElementById('note').value.trim();
            const reporter = localStorage.getItem('activeUser') || 'ไม่ระบุชื่อพนักงาน';
            const payload = { datetime, type, note, reporter, dept: 'drill', savedAt: new Date().toISOString() };

            if (!navigator.onLine) {
                let localData = JSON.parse(localStorage.getItem('offlineReports') || '[]');
                localData.push(payload);
                localStorage.setItem('offlineReports', JSON.stringify(localData));
                alert("⚠️ เน็ตหลุด! เซฟลงเครื่องให้แล้ว");
                return;
            }
            try {
                const response = await fetch('http://localhost:3000/api/reports', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if(response.ok) { alert("🎉 บันทึกรายงานสำเร็จ!"); location.reload(); }
            } catch(e) { alert("❌ เกิดข้อผิดพลาดทางเซิร์ฟเวอร์"); }
        }
    </script>
</head>
<body class="dept-drill">
    <aside class="sidebar">
        <div class="sidebar-brand">🏢 บจก.พี.วี.ที.แอนด์ ที.พลาส<span>ระบบบันทึกข้อมูลโรงงาน</span></div>
        <div id="mgr-nav" style="display: none; padding: 10px 15px;">
            <a href="dashboard.html" style="display: block; text-align: center; background: #4f46e5; color: white; padding: 10px; border-radius: 6px; font-weight: bold; text-decoration: none; font-size: 14px;">📊 กลับหน้าแดชบอร์ดหลัก</a>
        </div>
        <div class="sidebar-menu"><a href="#" class="active">📝 ฟอร์มรายงานปัญหาการผลิต</a></div>
        <div style="padding: 15px 20px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between;">
            <span style="font-size: 13px; color: var(--text-label);">🌙 โหมดกะดึก (ถนอมสายตา)</span>
            <input type="checkbox" id="themeToggleCheckbox" onchange="toggleTheme()">
        </div>
        <a href="javascript:void(0);" class="logout-btn" onclick="logout()">🚪 ออกจากระบบ</a>
    </aside>
    <main class="main-content">
        <div id="offlineBar" class="offline-bar">🚨 ออฟไลน์ ข้อมูลจะเซฟเก็บในเครื่อง <button onclick="location.reload()">🔄 ซิงค์ข้อมูล</button></div>
        <div class="top-header">
            <h2>🎯 ฟอร์มบันทึกข้อมูลปัญหา (แผนกตัดเจาะ)</h2>
            <div class="profile-widget">
                <div id="display-username">พนักงาน</div>
                <div id="prof-role" style="background:#db2777;">⚙️ กำลังปฏิบัติงาน</div>
            </div>
        </div>
        <div class="form-card">
            <form onsubmit="submitForm(event)">
                <div class="form-group"><label>📅 วันเวลาที่เกิดปัญหา</label><input type="datetime-local" id="report-datetime" required></div>
                <div class="form-group">
                    <label>⚠️ ปัญหาที่พบ</label>
                    <select id="problem-title" required>
                        <option value="" disabled selected>-- เลือกรายการปัญหา --</option>
                        <option value="มีดตัดไม่ขาด">มีดตัดไม่ขาด</option>
                        <option value="ตัดเอียง">ตัดเอียง</option>
                        <option value="ซีนไม่ติด">ซีนไม่ติด</option>
                        <option value="ซีนขาด">ซีนขาด</option>
                        <option value="เจาะไม่ทะลุ">เจาะไม่ทะลุ</option>
                        <option value="รูเจาะเอียง">รูเจาะเอียง</option>
                        <option value="ขนาดไม่ได้มาตรฐาน">ขนาดไม่ได้มาตรฐาน</option>
                        <option value="ผิวไม่ได้มาตรฐาน">ผิวไม่ได้มาตรฐาน</option>
                        <option value="เปลี่ยนยาง/ลวด/ลวดซีนเคลื่อน">เปลี่ยนยาง/ลวด/ลวดซีนเคลื่อน</option>
                        <option value="เปลี่ยนซีน">เปลี่ยนซีน</option>
                        <option value="เปลี่ยนไซร้">เปลี่ยนไซร้</option>
                        <option value="ซ่อมเครื่อง">ซ่อมเครื่อง</option>
                        <option value="ไฟดับ">ไฟดับ</option>
                        <option value="รอยต่อม้วน">รอยต่อม้วน</option>
                        <option value="เศษเจาะ">เศษเจาะ</option>
                        <option value="เศษปลายม้วน">เศษปลายม้วน</option>
                        <option value="สตาร์ทเครื่องใหม่">สตาร์ทเครื่องใหม่</option>
                        <option value="ปัญหาอื่นๆ">ปัญหาอื่นๆ</option>
                    </select>
                </div>
                <div class="form-group"><label>📝 รายละเอียดเพิ่มเติม</label><textarea id="note" required></textarea></div>
                <button type="submit" class="btn-submit">💾 บันทึกและส่งรายงานปัญหา</button>
            </form>
        </div>
    </main>
</body>
</html>

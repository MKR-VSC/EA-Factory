<!doctype html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ฟอร์มบันทึกของเสีย | EA Factory</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <link rel="stylesheet" href="/css/ea-go-live.css" />
</head>
<body>
  <main class="page">
    <header class="topbar">
      <div class="title">
        <h1><span class="material-symbols-outlined">assignment</span> ฟอร์มบันทึกของเสีย</h1>
        <p id="deptText">กำลังเตรียมข้อมูลแผนก...</p>
      </div>
      <div class="actions">
        <button class="btn secondary" type="button" onclick="resetFormAfterSubmit()">ล้างฟอร์ม</button>
        <button class="btn danger" type="button" onclick="logoutNow()">ออกระบบ</button>
      </div>
    </header>

    <section class="panel login-card" id="staffPanel">
      <div class="form-grid">
        <div class="form-group">
          <label>ชื่อผู้บันทึก</label>
          <input id="staffName" placeholder="กรอกชื่อผู้บันทึก" />
        </div>
        <div class="form-group">
          <label>&nbsp;</label>
          <button class="btn primary" type="button" onclick="saveStaffName()">เริ่มกรอกข้อมูล</button>
        </div>
      </div>
    </section>

    <form id="wasteForm" class="panel hidden">
      <div class="form-grid">
        <div class="form-group">
          <label>วัน-เวลา</label>
          <input type="datetime-local" id="incidentDatetime" required />
        </div>
        <div class="form-group">
          <label>กะ</label>
          <select id="shiftSelect" required><option value="">กำลังโหลด...</option></select>
        </div>
        <div class="form-group">
          <label>เครื่องจักร</label>
          <select id="machineSelect" required><option value="">กำลังโหลด...</option></select>
        </div>
      </div>

      <div class="table-head" style="margin-top:18px">
        <div>
          <h2>รายการปัญหา</h2>
          <p class="muted">เลือกได้หลายปัญหา และใส่น้ำหนักแยกแต่ละข้อ</p>
        </div>
        <button class="btn success" type="button" onclick="addProblemRow()">+ เพิ่มปัญหา</button>
      </div>

      <div class="table-scroll">
        <table class="problem-form-table">
          <thead><tr><th style="width:34%">ปัญหา</th><th style="width:18%">น้ำหนัก kg</th><th>รายละเอียด</th><th style="width:80px">ลบ</th></tr></thead>
          <tbody id="problemRows"></tbody>
        </table>
      </div>

      <div class="total-box" style="margin-top:14px"><span>น้ำหนักของเสียรวม</span><strong id="totalWasteText">0.00 kg</strong></div>
      <div class="actions" style="justify-content:flex-end;margin-top:18px"><button class="btn primary" type="submit">บันทึกข้อมูล</button></div>
    </form>
  </main>

  <div id="appModal" class="modal hidden"><div class="modal-card"><div class="modal-head"><h3 id="modalTitle">แจ้งเตือน</h3><button class="modal-close" onclick="closeModal()">×</button></div><div id="modalBody"></div><div id="modalActions" class="modal-actions"></div></div></div>
  <div id="toast" class="toast hidden"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/core/supabaseClient.js"></script>
  <script src="/core/activityLogger.js"></script>
  <script src="/js/department/form-department.js?v=go-live-1"></script>
</body>
</html>

<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ตรวจสอบรายวัน | Supervisor</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&family=Kanit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/ea-go-live.css" />
    <link rel="stylesheet" href="/css/supervisor-daily-review.css" />
  </head>
  <body>
    <main class="page">
      <header class="topbar">
        <div class="title">
          <h1>
            <span class="material-symbols-outlined">fact_check</span>
            ตรวจสอบรายงานประจำวัน
          </h1>
          <p id="userInfo">-</p>
        </div>
        <div class="actions">
          <a class="btn light" href="/pages/supervisor-dashboard.html"
            >Dashboard</a
          ><button class="btn secondary" onclick="loadPageData()">รีเฟรช</button
          ><button class="btn danger" onclick="logoutNow()">ออกระบบ</button>
        </div>
      </header>
      <section class="panel">
        <div class="filter-grid">
          <div class="form-group">
            <label>วันที่</label><input type="date" id="filterDate" />
          </div>
          <div class="form-group">
            <label>สถานะ</label
            ><select id="filterStatus">
              <option value="pending_supervisor">รอตรวจสอบ</option>
              <option value="sent_accounting">ส่งบัญชีแล้ว</option>
              <option value="all">ทั้งหมด</option>
            </select>
          </div>
          <div class="form-group">
            <label>&nbsp;</label
            ><button class="btn primary" onclick="loadPageData()">ค้นหา</button>
          </div>
        </div>
      </section>
      <section class="summary-grid">
        <div class="summary-card warning">
          <span>รอตรวจสอบ</span><strong id="sumPending">0</strong>
        </div>
        <div class="summary-card success">
          <span>ของเสียรวม</span><strong id="sumWaste">0 kg</strong>
        </div>
        <div class="summary-card danger">
          <span>เครื่องสูงสุด</span><strong id="sumTopMachine">-</strong>
        </div>
      </section>
      <section class="panel">
        <div class="table-head">
          <div>
            <h2>รายการรายงานของเสีย</h2>
            <p class="muted">ตรวจสอบข้อมูลก่อนส่งให้บัญชีดำเนินการต่อ</p>
          </div>
          <span id="rowCount" class="muted">-</span>
        </div>
        <div class="table-scroll">
          <table class="data-table">
            <thead>
              <tr>
                <th></th>
                <th>วันที่/เวลา</th>
                <th>แผนก</th>
                <th>เครื่องจักร</th>
                <th>ผู้บันทึก</th>
                <th class="text-right">น้ำหนักของเสีย</th>
                <th>รายการปัญหา</th>
                <th>สถานะ</th>
                <th>จัดการ</th>
              </tr>
            </thead>
            <tbody id="reportBody">
              <tr>
                <td colspan="9" class="empty">กำลังโหลดข้อมูล...</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
    <div id="appModal" class="modal hidden">
      <div class="modal-card">
        <div class="modal-head">
          <h3 id="modalTitle">แจ้งเตือน</h3>
          <button class="modal-close" onclick="closeModal()">×</button>
        </div>
        <div id="modalBody"></div>
        <div id="modalActions" class="modal-actions"></div>
      </div>
    </div>
    <div id="toast" class="toast hidden"></div>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/core/supabaseClient.js"></script>
    <script src="/core/activityLogger.js"></script>
    <script src="/core/roleConfig.js"></script>
    <script src="/core/departmentConfig.js"></script>
    <script src="/js/dashboard/supervisor-daily-review.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบขอคืนสิทธิ์และรีเซ็ทรหัสผ่าน - PVT</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8fafc;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .form-card {
            background: #ffffff; max-width: 450px; width: 100%;
            padding: 40px 30px; border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); box-sizing: border-box;
        }
        h2 { color: #e11d48; text-align: center; margin-bottom: 5px; font-size: 24px; }
        p.subtitle { color: #64748b; text-align: center; font-size: 14px; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 14px; font-weight: bold; color: #334155; margin-bottom: 8px; }
        .form-input, .form-textarea {
            width: 100%; padding: 12px 15px; border: 1px solid #cbd5e1;
            border-radius: 8px; font-size: 15px; box-sizing: border-box; outline: none; font-family: inherit;
        }
        .form-input:focus, .form-textarea:focus { border-color: #e11d48; box-shadow: 0 0 0 3px rgba(225, 29, 72, 0.1); }
        .form-textarea { resize: vertical; min-height: 80px; }
        .btn-submit {
            width: 100%; padding: 14px; background: #e11d48; color: white; border: none;
            border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; transition: 0.3s;
        }
        .btn-submit:hover { background: #be123c; }
        .link-back {
            display: block; text-align: center; margin-top: 20px; padding-top: 15px;
            border-top: 1px solid #e2e8f0; color: #2563eb; text-decoration: none; font-size: 14px; font-weight: bold;
        }
        .link-back:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="form-card">
        <h2 style="display: flex; align-items: center; justify-content: center; gap: 6px;">
    <span class="material-symbols-outlined" style="color: #ea580c;">lock_reset</span> รีเซ็ทรหัสผ่านใหม่ (Reset Password)
  </h2>
        <p class="subtitle">ระบบส่งคำขอตรวจสอบสิทธิ์ให้ฝ่ายไอทีดำเนินการ</p>

        <form onsubmit="handleResetRequest(event)">
            <div class="form-group">
                <label>👤 รหัสพนักงาน / Username</label>
                <input type="text" id="reset-username" class="form-input" placeholder="ระบุชื่อผู้ใช้ที่ใช้ล็อกอิน..." required>
            </div>

            <div class="form-group">
                <div class="form-group">
                    <label for="reset-dept">🏢 แผนกต้นสังกัดปัจจุบัน</label>
                    <select id="reset-dept" class="form-input" required>
                        <option value="" disabled selected>-- เลือกแผนกของคุณ --</option>
                        <option value="blow">เป่าถุง (BLOW)</option>
                        <option value="mono">โมโน (MONO)</option>
                        <option value="salan">สแลน (SALAN)</option>
                        <option value="sheet">ตัดผืน (SHEET)</option>
                        <option value="pipe">ท่อ (PIPE)</option>
                        <option value="drill">ตัดเจาะ (DRILL)</option>
                        <option value="tape">เจาะเทปน้ำพุ่ง (TAPE)</option>
                        <option value="garbage">ตัดถุงขยะ (GARBAGE)</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>🔒 รหัสผ่านใหม่ที่ต้องการตั้ง</label>
                <input type="password" id="reset-new-password" class="form-input" placeholder="ตั้งรหัสผ่านใหม่ไม่ต่ำกว่า 6 ตัวอักษร..." required>
            </div>

            <div class="form-group">
                <label>📝 เหตุผลในการขอเปลี่ยน</label>
                <textarea id="reset-reason" class="form-textarea" placeholder="เช่น ลืมรหัสผ่านเดิม, บัญชีล็อก..." required></textarea>
            </div>

            <button type="submit" class="btn-submit">🚀 ส่งคำขอไปยังระบบไอที</button>
        </form>

        <a href="login2.html" class="link-back">⬅️ กลับสู่หน้าจอล็อกอินหลัก</a>
    </div>

    <script>
        // 🔑 เชื่อมต่อ Supabase
        const SUPABASE_URL = "https://yviibwmojkodhkxgmkgb.supabase.co";
        const SUPABASE_KEY = "sb_publishable_3seUH8g6QzA6y7fuYDeoxw_HVV4ZmeL";
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function handleResetRequest(event) {
            event.preventDefault();

            const username = document.getElementById('reset-username').value;
            const department = document.getElementById('reset-dept').value;
            const newPassword = document.getElementById('reset-new-password').value;
            const reason = document.getElementById('reset-reason').value;

            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());

            // 📦 ประกอบแพ็กเกจข้อมูลยิงเข้าตารางกลาง (pvt_pvt_production_reports)
            const resetPayload = {
                incident_datetime: now.toISOString().slice(0, 16),
                work_shift: "ระบบกลาง", // เว้นไว้เป็นค่า Default
                department: department,
                machine_no: "IT-SUPPORT", // ระบุให้แอดมินรู้ว่าเป็นเรื่องของไอที
                problem_type: "ลืมรหัสผ่าน",
                report_type: "คำขอรีเซ็ทรหัสผ่าน",
                waste_weight_kg: 0,
                detail: `ขอเปลี่ยนรหัสใหม่เป็น: ${newPassword} | เหตุผล: ${reason}`,
                status: "pending",
                reported_by: username
            };

            try {
                // ยิงตรงเข้า Supabase
                const { error } = await supabase
                    .from('pvt_production_reports')
                    .insert([resetPayload]);

                if (error) throw error;

                alert(`📬 ส่งคำขอรีเซ็ทรหัสผ่านของ Username: ${username} สำเร็จ!\nกรุณาแจ้งฝ่ายไอทีให้ตรวจสอบและอนุมัติในระบบหลังบ้านครับ`);
                window.location.href = 'login2.html'; // วาร์ปกลับหน้าล็อกอิน

            } catch (err) {
                console.error("Reset Error:", err);
                alert("❌ เกิดข้อผิดพลาดในการส่งคำขอ: " + err.message);
            }
        }
    </script>
</body>
</html>

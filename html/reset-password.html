<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบขอคืนสิทธิ์และรีเซ็ทรหัสผ่าน - PVT</title>
    <link rel="icon" href="data:;base64,=">
    <link rel="stylesheet" href="main-style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background: var(--bg-main);">

    <div class="form-card" style="max-width: 450px; width: 100%; padding: 30px; box-shadow: 0 10px 25px rgba(0,0,0,0.08);">
        <div style="text-align: center; margin-bottom: 25px;">
            <h2 style="color: #1e3a8a; margin-bottom: 5px;">🔑 ขอรีเซ็ทรหัสผ่านใหม่</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin: 0;">ระบบส่งคำขอตรวจสอบสิทธิ์พนักงานส่วนกลาง</p>
        </div>

        <form onsubmit="handleResetRequest(event)">
            <div class="form-group">
                <label>👤 รหัสพนักงาน / ชื่อบัญชีผู้ใช้ (Username)</label>
                <input type="text" id="reset-username" placeholder="ระบุชื่อผู้ใช้ที่ใช้ล็อกอิน..." required>
            </div>

            <div class="form-group">
                <label>🏢 แผนกต้นสังกัดปัจจุบัน</label>
                <select id="reset-dept" required>
                    <option value="" disabled selected>-- เลือกแผนกของคุณ --</option>
                    <option value="blow">แผนกเป่า (BLOW)</option>
                    <option value="mono">แผนกโมโน (MONO)</option>
                    <option value="pipe">แผนกท่อ (PIPE)</option>
                    <option value="salan">แผนกสแลน (SALAN)</option>
                    <option value="sheet">แผนกตัดผืน (SHEET)</option>
                    <option value="tape">แผนกเจาะเทปน้ำพุ่ง (TAPE)</option>
                    <option value="drill">แผนกตัดเจาะ (DRILL)</option>
                    <option value="garbage">แผนกตัดถุงขยะ (GARBAGE)</option>
                </select>
            </div>

            <div class="form-group">
                <label>🔒 รหัสผ่านใหม่ที่ต้องการตั้ง (New Password)</label>
                <input type="password" id="reset-new-password" placeholder="ตั้งรหัสผ่านใหม่ไม่ต่ำกว่า 4 ตัวอักษร..." required>
            </div>

            <div class="form-group">
                <label>📝 เหตุผลในการขอเปลี่ยนรหัสผ่าน</label>
                <textarea id="reset-reason" placeholder="เช่น ลืมรหัสผ่านเดิม, บัญชีล็อก หรือขอเปลี่ยนตามรอบความปลอดภัย..." required></textarea>
            </div>

            <button type="submit" class="btn-submit" style="width: 100%; margin-top: 10px; background: #e11d48;">
                ส่งคำขอรีเซ็ทรหัสผ่านไปยังระบบไอที
            </button>
        </form>

        <div style="text-align: center; margin-top: 20px; border-top: 1px solid var(--border-color); padding-top: 15px;">
            <a href="login.html" style="color: #2563eb; text-decoration: none; font-size: 14px; font-weight: bold;">
                ⬅️ กลับสู่หน้าจอล็อกอินหลัก
            </a>
        </div>
    </div>

    <script>
        async function handleResetRequest(event) {
            event.preventDefault();

            const username = document.getElementById('reset-username').value;
            const department = document.getElementById('reset-dept').value;
            const newPassword = document.getElementById('reset-new-password').value;
            const reason = document.getElementById('reset-reason').value;

            const now = new Date();
            const formattedTime = now.toLocaleString('th-TH', { hour12: false });

            // แปลงโครงสร้างข้อมูลจัดระเบียบฝากเข้าคีย์หลักเพื่อไปโผล่ที่ระบบ Admin และ Dashboard หลังบ้าน
            const resetPayload = {
                datetime: now.toISOString().replace('T', ' ').substring(0, 16),
                department: department,
                type: '🔒 คำขอรีเซ็ทรหัสผ่าน',
                reportType: 'ระบบความปลอดภัย (Security)',
                detail: `ผู้ขอ: ${username} | รหัสใหม่ที่ต้องการ: ${newPassword} | เหตุผล: ${reason}`,
                status: 'pending' // ตั้งค่ารออนุมัติดำเนินการจากไอที
            };

            // 1. เก็บลง Local Cache สำรองภายในเครื่อง
            try {
                let cachedData = JSON.parse(localStorage.getItem('pvtLocalReportsCache')) || [];
                cachedData.push(resetPayload);
                localStorage.setItem('pvtLocalReportsCache', JSON.stringify(cachedData));
            } catch(e) { console.error("Local Storage Cache Error:", e); }

            // 2. ยิงตรงเข้าสู่ระบบเซิร์ฟเวอร์หลักพอร์ต 3000 ตัวกลางหลังบ้าน
            try {
                const response = await fetch('https://ea-factory-api.onrender.com/api/reports', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(resetPayload)
                });
                
                if (response.ok) {
                    alert(`📬 ส่งคำขอรีเซ็ทรหัสผ่านของกลุ่มพนักงานแผนก ${department.toUpperCase()} สำเร็จ!\nกรุณาแจ้งฝ่ายไอทีหรือผู้ดูแลระบบเพื่อทำการตรวจสอบอนุมัติในแผงควบคุม`);
                    window.location.href = 'login.html';
                    return;
                }
            } catch (error) {
                // ถ้าปิดเซิร์ฟเวอร์ไว้ จะบันทึกแบบ Offline
                alert(`📦 เซิร์ฟเวอร์ออฟไลน์ชั่วคราว! ระบบเก็บคำขอรีเซ็ทรหัสไว้ในหน่วยความจำเครื่องให้แล้ว เมื่อระบบเชื่อมต่อพอร์ต 3000 จะถูกส่งมอบอัตโนมัติ`);
                window.location.href = 'login.html';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกข้อมูลการผลิต - แผนกเป่า</title>
    <link rel="icon" href="data:;base64,=">
    <link rel="stylesheet" href="main-style.css">
    <script>
        // 🔒 เวอร์ชันปลดล็อกสิทธิ์ถาวร - ห้ามสั่งเด้งออกเด็ดขาด
        (function() {
            try {
                console.log("👤 ผู้ใช้งานปัจจุบัน:", localStorage.getItem('activeUser'), "สิทธิ์:", localStorage.getItem('activeRole'));
                // ปล่อยผ่านให้โหลดหน้าเว็บ ไม่ต้องตรวจสอบและไม่ต้องสั่งเปลี่ยนหน้า
                return;
            } catch (e) { 
                console.error("ระบบตรวจสิทธิ์ขัดข้องแต่ปล่อยผ่าน:", e); 
            }
        })();

        window.onload = function() {
            document.getElementById('display-username').innerText = localStorage.getItem('activeUser') || 'ผู้บริหาร/พนักงาน';
            const role = localStorage.getItem('activeRole');
            if (role === 'management' || role === 'supervisor') {
                document.getElementById('mgr-nav').style.display = 'block';
                document.getElementById('prof-role').innerText = '👑 ผู้เข้าตรวจสอบ';
                document.getElementById('prof-role').style.background = '#2563eb';
            }
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('report-datetime').value = now.toISOString().slice(0, 16);
            document.body.setAttribute('data-theme', localStorage.getItem('pvtTheme') || 'light');
            document.getElementById('themeToggleCheckbox').checked = (localStorage.getItem('pvtTheme') === 'dark');
            checkOnlineStatus();
        };

        function logout() {
            if(confirm("🚪 ออกจากระบบใช่หรือไม่?")) {
                localStorage.clear();
                window.location.href = 'login.html';
            }
        }

        function toggleTheme() {
            const isDark = document.getElementById('themeToggleCheckbox').checked;
            const theme = isDark ? 'dark' : 'light';
            document.body.setAttribute('data-theme', theme);
            localStorage.setItem('pvtTheme', theme);
        }

        function checkOnlineStatus() {
            const bar = document.getElementById('offlineBar');
            if (navigator.onLine) { bar.style.display = 'none'; } else { bar.style.display = 'block'; }
        }

        async function submitForm(event) {
            event.preventDefault();
            const payload = { 
                datetime: document.getElementById('report-datetime').value, 
                type: document.getElementById('problem-title').value, 
                note: document.getElementById('note').value.trim(), 
                reporter: localStorage.getItem('activeUser') || 'ไม่ระบุชื่อ', 
                dept: 'blow', savedAt: new Date().toISOString() 
            };
            try {
                const response = await fetch('http://localhost:3000/api/reports', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                if(response.ok) { alert("🎉 บันทึกรายงานสำเร็จ!"); location.reload(); }
            } catch(e) { alert("❌ เอเรอร์ระบบเซิร์ฟเวอร์"); }
        }
    </script>
</head>
<body class="dept-blow">
    <aside class="sidebar">
        <div class="sidebar-brand">🏢 บจก.พี.วี.ที.แอนด์ ที.พลาส<span>ระบบบันทึกข้อมูลโรงงาน</span></div>
        <div id="mgr-nav" style="display: none; padding: 10px 15px;">
            <a href="dashboard.html" style="display: block; text-align: center; background: #2563eb; color: white; padding: 10px; border-radius: 6px; font-weight: bold; text-decoration: none; font-size: 14px;">📊 กลับหน้าแดชบอร์ดหลัก</a>
        </div>
        <div class="sidebar-menu"><a href="#" class="active">📝 ฟอร์มรายงานปัญหาการผลิต</a></div>
        <div style="padding: 15px 20px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between;">
            <span style="font-size: 13px; color: var(--text-label);">🌙 โหมดกะดึก (ถนอมสายตา)</span>
            <input type="checkbox" id="themeToggleCheckbox" onchange="toggleTheme()">
        </div>
        <a href="javascript:void(0);" class="logout-btn" onclick="logout()">🚪 ออกจากระบบ</a>
    </aside>
    <main class="main-content">
        <div id="offlineBar" class="offline-bar">🚨 ออฟไลน์ ข้อมูลจะเซฟในเครื่อง <button onclick="location.reload()">🔄 ซิงค์ข้อมูล</button></div>
        <div class="top-header">
            <h2>🏭 ฟอร์มบันทึกข้อมูลปัญหา (แผนกเป่า)</h2>
            <div class="profile-widget">
                <div id="display-username">พนักงาน</div>
                <div id="prof-role" style="background:#db2777;">⚙️ กำลังปฏิบัติงาน</div>
            </div>
        </div>
        <div class="form-card">
            <form onsubmit="submitForm(event)">
                <div class="form-group"><label>📅 วันเวลาที่เกิดปัญหา</label><input type="datetime-local" id="report-datetime" required></div>
                <div class="form-group">
                    <label>⚠️ ปัญหาที่พบ</label>
                    <select id="problem-title" required>
                        <option value="" disabled selected>-- เลือกรายการปัญหา --</option>
                        <option value="เปลี่ยนแม่พิมพ์บ่อย">เปลี่ยนแม่พิมพ์บ่อย</option>
                        <option value="ฮีตเตอร์ไม่ร้อน">ฮีตเตอร์ไม่ร้อน</option>
                        <option value="กระบอกสูบติดขัด">กระบอกสูบติดขัด</option>
                        <option value="ใบมีดตัดไม่ขาด">ใบมีดตัดไม่ขาด</option>
                        <option value="สายพานลำเลียงหน่วง">สายพานลำเลียงหน่วง</option>
                        <option value="แม่พิมพ์อุดตัน">แม่พิมพ์อุดตัน</option>
                        <option value="ปัญหาอื่นๆ">ปัญหาอื่นๆ</option>
                    </select>
                </div>
                <div class="form-group"><label>📝 รายละเอียดเพิ่มเติม</label><textarea id="note" required></textarea></div>
                <button type="submit" class="btn-submit">💾 บันทึกและส่งรายงานปัญหา</button>
            </form>
        </div>
    </main>
</body>
</html>
